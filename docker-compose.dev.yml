version: '3.8'
services:
  php:
    build: .
    environment:
      - APP_ENV=local
    volumes:
      - ./:/var/www/html
    ports:
      - '9000:9000'

  node:
    image: node:18-alpine
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install -g pnpm && pnpm install --frozen-lockfile || true && pnpm dev --host 0.0.0.0"
    ports:
      - '5173:5173'

  nginx:
    image: nginx:stable-alpine
    ports:
      - '8000:80'
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - node
